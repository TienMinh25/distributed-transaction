name: Go-WAL CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Verify formatting (gofmt)
        run: |
          fmt_diff=$(gofmt -l .)
          if [ -n "$fmt_diff" ]; then
            echo "All files which aren't run gofmt:"
            echo "$fmt_diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test ./... -v -race